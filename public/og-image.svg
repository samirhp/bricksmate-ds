    </radialGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b76f7" stop-opacity="0.55"/><stop offset="1" stop-color="#8b76f7" stop-opacity="0"/>
